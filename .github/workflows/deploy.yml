# ============================================
# NeuroAgent Hub - GitHub Actions Deploy
# Auto-Deploy to Railway on Push to Main
# ============================================

name: Deploy to Railway

on:
  # Trigger on push to main branch
  push:
    branches:
      - main
      - master
      - production
    paths:
      - 'server.js'
      - 'index.html'
      - 'package.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

# Prevent concurrent deployments
concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  # ============================================
  # JOB 1: BUILD & TEST
  # ============================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      # Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Setup Node.js
      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      # Install dependencies
      - name: 📦 Install dependencies
        run: npm ci
      
      # Lint code
      - name: 🔍 Lint code
        run: npm run lint 2>/dev/null || echo "No lint script found"
      
      # Run tests
      - name: ✅ Run tests
        run: npm test 2>/dev/null || echo "No test script found"
      
      # Build application
      - name: 🔨 Build application
        run: npm run build 2>/dev/null || echo "No build script needed"
      
      # Check for vulnerabilities
      - name: 🛡️ Security audit
        run: npm audit --audit-level=moderate 2>/dev/null || echo "Audit completed"
      
      # Upload coverage
      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  # ============================================
  # JOB 2: BUILD DOCKER IMAGE
  # ============================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    
    permissions:
      contents: read
      packages: write
    
    steps:
      # Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Set up Docker Buildx
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      # Login to GitHub Container Registry
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Build and push Docker image
      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # JOB 3: DEPLOY TO RAILWAY
  # ============================================
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-docker
    
    # Only deploy on main branch
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    environment:
      name: production
      url: https://${{ secrets.RAILWAY_APP_DOMAIN }}
    
    steps:
      # Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Install Railway CLI
      - name: 🚂 Install Railway CLI
        run: npm i -g @railway/cli
      
      # Deploy to Railway
      - name: 🚀 Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --detach
      
      # Wait for deployment
      - name: ⏳ Wait for deployment
        run: sleep 30
      
      # Health check
      - name: 🏥 Health check
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          APP_URL="${{ secrets.RAILWAY_APP_DOMAIN }}"
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            echo "Checking health... (Attempt $((ATTEMPT + 1))/$MAX_ATTEMPTS)"
            
            if curl -f "https://${APP_URL}/api/health" > /dev/null 2>&1; then
              echo "✅ Application is healthy!"
              exit 0
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            sleep 2
          done
          
          echo "❌ Application health check failed"
          exit 1

  # ============================================
  # JOB 4: DEPLOYMENT NOTIFICATIONS
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [build-and-test, build-docker, deploy-railway]
    if: always()
    
    steps:
      # Set status message
      - name: 📨 Determine status
        id: status
        run: |
          if [ "${{ needs.deploy-railway.result }}" = "success" ]; then
            echo "message=✅ Deployment successful!" >> $GITHUB_OUTPUT
            echo "color=00ff00" >> $GITHUB_OUTPUT
          else
            echo "message=❌ Deployment failed!" >> $GITHUB_OUTPUT
            echo "color=ff0000" >> $GITHUB_OUTPUT
          fi
      
      # Discord notification
      - name: 📢 Discord notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ needs.deploy-railway.result }}
          content: |
            🤖 **NeuroAgent Hub Deployment**
            
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Status:** ${{ steps.status.outputs.message }}
            **App URL:** ${{ secrets.RAILWAY_APP_DOMAIN }}
          
          color: ${{ steps.status.outputs.color }}
        continue-on-error: true

  # ============================================
  # JOB 5: PERFORMANCE MONITORING
  # ============================================
  performance-check:
    name: Performance Check
    runs-on: ubuntu-latest
    needs: deploy-railway
    if: success()
    
    steps:
      # Checkout code
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # Setup Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.
