# ============================================
# VOLUMES
# ============================================

volumes:
  ollama_data:
    driver: local
  
  neuroagent_data:
    driver: local
  
  neuroagent_logs:
    driver: local
  
  neuroagent_memory:
    driver: local
  
  # Uncomment if using optional services
  # mongodb_data:
  #   driver: local
  # 
  # mongodb_config:
  #   driver: local
  # 
  # redis_data:
  #   driver: local

# ============================================
# NETWORKS
# ============================================

networks:
  neuroagent-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================
# USAGE GUIDE
# ============================================

# Start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f neuroagent
#
# Stop services:
#   docker-compose down
#
# Remove data:
#   docker-compose down -v
#
# Scale services:
#   docker-compose up -d --scale neuroagent=3
#
# Check status:
#   docker-compose ps
#
# Execute command in container:
#   docker-compose exec neuroagent npm start
#
# Rebuild image:
#   docker-compose up -d --build
