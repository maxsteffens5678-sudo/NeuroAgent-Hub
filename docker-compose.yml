  #     timeout: 10s
  #     retries: 3

  # ============================================
  # REDIS - Optional Caching & Session Store
  # Uncomment to enable caching
  # ============================================
  # redis:
  #   image: redis:7-alpine
  #   container_name: neuroagent-redis
  #   
